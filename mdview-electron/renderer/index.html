<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';" />
  <title>mdview</title>
  <link rel="stylesheet" href="style.css" />
  <link id="hljs-theme" rel="stylesheet" href="vendor/themes/hljs/vs2015.css" />
</head>
<body>
  <div id="toolbar">
    <button id="open-btn">ファイルを開く</button>
    <span id="file-name">ファイルが開かれていません</span>
  </div>
  <div id="app">
    <aside id="toc">
      <div id="toc-header">目次</div>
      <nav id="toc-nav"></nav>
    </aside>
    <div class="resize-handle" id="resize-toc" data-target="toc"></div>
    <main id="content">
      <div id="markdown-body">
        <p class="placeholder">Ctrl+O またはボタンで Markdown ファイルを開いてください。</p>
      </div>
    </main>
    <div class="resize-handle" id="resize-notes" data-target="notes"></div>
    <aside id="notes">
      <div id="notes-header">
        <span id="notes-heading-label">（見出しにスクロール）</span>
      </div>
      <textarea id="notes-textarea"
                placeholder="この見出しのメモ..."
                spellcheck="false"
                disabled></textarea>
    </aside>
  </div>
  <div id="statusbar">
    <span id="sb-file" class="sb-field"></span>
    <span id="sb-position" class="sb-field"></span>
    <span id="sb-toc-hint" class="sb-field"></span>
    <span id="sb-keys" class="sb-hint">[j/k]scroll [g/G]top/end [t]TOC [n]notes [H/L]resize [r]reload [q]quit</span>
  </div>
  <script type="module" src="renderer.js"></script>
</body>
</html>
